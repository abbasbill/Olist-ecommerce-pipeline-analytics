id: olist_sales_dbt
namespace: dev
description: Clone dbt project into a working directory and run dbt commands inside a Docker task runner

tasks:
  - id: dbt
    type: io.kestra.plugin.core.flow.WorkingDirectory
    tasks:
      - id: clone_repository
        type: io.kestra.plugin.git.Clone
        url: https://github.com/abbasbill/Olist-ecommerce-pipeline-analytics.git
        branch: main
        path: dbt

      - id: dbt_deps
        type: io.kestra.plugin.dbt.cli.DbtCLI
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
        projectDir: dbt/olist_analytics
        commands:
          - dbt deps
        env:
          DBT_PROFILES_DIR: dbt/olist_analytics
          GOOGLE_APPLICATION_CREDENTIALS: "{{ secret('GOOGLE_APPLICATION_CREDENTIALS') }}"

      - id: run_dbt_transformations
        type: io.kestra.plugin.dbt.cli.DbtCLI
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
        projectDir: dbt/olist_analytics
        commands:
          - dbt build --select stg_* marts.fct_sales --target prod
        env:
          DBT_PROFILES_DIR: dbt/olist_analytics
          GOOGLE_APPLICATION_CREDENTIALS: "{{ secret('GOOGLE_APPLICATION_CREDENTIALS') }}"
        timeout: PT30M

      - id: run_dbt_tests
        type: io.kestra.plugin.dbt.cli.DbtCLI
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
        projectDir: dbt/olist_analytics
        commands:
          - dbt test --select marts.fct_sales --target prod
        env:
          DBT_PROFILES_DIR: dbt/olist_analytics
          GOOGLE_APPLICATION_CREDENTIALS: "{{ secret('GOOGLE_APPLICATION_CREDENTIALS') }}"

      - id: generate_dbt_docs
        type: io.kestra.plugin.dbt.cli.DbtCLI
        taskRunner:
          type: io.kestra.plugin.scripts.runner.docker.Docker
        containerImage: ghcr.io/kestra-io/dbt-bigquery:latest
        projectDir: dbt/olist_analytics
        commands:
          - dbt docs generate
        env:
          DBT_PROFILES_DIR: dbt/olist_analytics
          GOOGLE_APPLICATION_CREDENTIALS: "{{ secret('GOOGLE_APPLICATION_CREDENTIALS') }}"

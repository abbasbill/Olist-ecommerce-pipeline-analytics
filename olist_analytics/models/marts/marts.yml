version: 2

models:
  - name: fct_sales
    description: |
      Core fact table for Olist sales analytics. Combines orders, order items, 
      products, and payments data for revenue and sales performance analysis.
      
      **Partitioning**: order_month (DATE_TRUNC of order_purchase_timestamp)
      **Clustering**: product_category_name_english, payment_type
      **Grain**: One row per order item
      **Filters**: Only includes 'delivered' and 'shipped' orders with positive prices
    
    columns:
      - name: order_id
        description: Unique order identifier
        tests:
          - not_null
      - name: order_item_id
        description: Unique identifier for item within order
        tests:
          - not_null
          - unique:
              arguments:
                column_name: "order_id || '-' || order_item_id"
      - name: order_purchase_timestamp
        description: When the customer placed the order (UTC)
        tests:
          - not_null
      - name: order_month
        description: Order date truncated to first day of month
        tests:
          - not_null
      - name: customer_id
        description: Foreign key to customer
        tests:
          - not_null
      - name: order_status
        description: Current status of the order
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['delivered', 'shipped']
      - name: product_id
        description: Foreign key to product
        tests:
          - not_null
      - name: product_category_name
        description: Product category in Portuguese
        tests:
          - not_null
      - name: product_category_name_english
        description: Product category in English
        tests:
          - not_null
      - name: price
        description: Item price in BRL (Brazilian Real)
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: revenue
        description: Total revenue for this item
        tests:
          - not_null
          - dbt_utils.accepted_range:
              arguments:
                min_value: 0
      - name: payment_type
        description: Primary payment method for this order
      - name: total_payment_value
        description: Aggregated payment amount by payment type
      - name: seller_id
        description: Seller/merchant identifier
      - name: dbt_updated_at
        description: Timestamp when this row was last updated by dbt

    tests:
      - dbt_utils.recency:
          config:
            severity: warn
          arguments:  
            datepart: day
            field: order_purchase_timestamp
            interval: 365
